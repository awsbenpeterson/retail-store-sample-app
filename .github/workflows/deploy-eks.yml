name: Deploy to EKS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Container image tag to deploy (e.g. short SHA or "latest")'
        required: false
        default: 'latest'
      auto_approve:
        description: 'Auto-approve terraform apply'
        required: false
        default: false
        type: boolean
      opentelemetry_enabled:
        description: 'Enable OpenTelemetry tracing'
        required: false
        default: false
        type: boolean
      istio_enabled:
        description: 'Enable Istio service mesh'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.14.0'
  ECR_REGISTRY_PREFIX: retail-store

jobs:
  ecr-setup:
    name: Ensure ECR Repositories
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-ECRSetup

      - name: Terraform Init (ECR)
        working-directory: terraform/ecr
        run: terraform init

      - name: Terraform Apply (ECR)
        working-directory: terraform/ecr
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}"

  build-and-push:
    name: Build ${{ matrix.service }}
    needs: ecr-setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ui, catalog, cart, orders, checkout]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-BuildImages

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Build and push image
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          SHORT_SHA="$(echo "${COMMIT_SHA}" | cut -c1-7)"
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          PREFIX="${{ env.ECR_REGISTRY_PREFIX }}-${{ matrix.service }}"
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"

          if [ "$IMAGE_TAG" = "latest" ]; then
            TAGS="${REGISTRY}/${PREFIX}:${SHORT_SHA},${REGISTRY}/${PREFIX}:latest"
          else
            TAGS="${REGISTRY}/${PREFIX}:${IMAGE_TAG},${REGISTRY}/${PREFIX}:latest"
          fi

          echo "Building ${{ matrix.service }} with tags: ${TAGS}"

          yarn nx container "${{ matrix.service }}" \
            --tags="${TAGS}" \
            --push=true

  terraform-plan:
    name: Terraform Plan (EKS)
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TerraformPlan

      - name: Get ECR image URLs
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_BASE="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"

          if [ "$IMAGE_TAG" = "latest" ]; then
            IMAGE_TAG="$(echo "${{ github.sha }}" | cut -c1-7)"
          fi

          echo "ui=${ECR_BASE}/${{ env.ECR_REGISTRY_PREFIX }}-ui:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "catalog=${ECR_BASE}/${{ env.ECR_REGISTRY_PREFIX }}-catalog:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "cart=${ECR_BASE}/${{ env.ECR_REGISTRY_PREFIX }}-cart:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "orders=${ECR_BASE}/${{ env.ECR_REGISTRY_PREFIX }}-orders:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "checkout=${ECR_BASE}/${{ env.ECR_REGISTRY_PREFIX }}-checkout:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Terraform Init
        working-directory: terraform/eks/default
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: terraform/eks/default
        env:
          TF_VAR_container_image_overrides: '{"ui":"${{ steps.ecr.outputs.ui }}","catalog":"${{ steps.ecr.outputs.catalog }}","cart":"${{ steps.ecr.outputs.cart }}","orders":"${{ steps.ecr.outputs.orders }}","checkout":"${{ steps.ecr.outputs.checkout }}"}'
          TF_VAR_opentelemetry_enabled: ${{ github.event.inputs.opentelemetry_enabled }}
          TF_VAR_istio_enabled: ${{ github.event.inputs.istio_enabled }}
        run: |
          set +e
          terraform plan \
            -input=false \
            -out=tfplan \
            -detailed-exitcode
          exitcode=$?
          set -e

          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT

          if [ "$exitcode" -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          elif [ "$exitcode" -eq 2 ]; then
            echo "::notice::Changes detected, apply needed"
          else
            echo "::notice::No changes detected"
          fi

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-eks
          path: terraform/eks/default/tfplan
          retention-days: 5

  terraform-apply:
    name: Terraform Apply (EKS)
    needs: terraform-plan
    if: needs.terraform-plan.outputs.plan_exitcode == '2' || github.event.inputs.auto_approve == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TerraformApply

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-eks
          path: terraform/eks/default

      - name: Terraform Init
        working-directory: terraform/eks/default
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/eks/default
        run: terraform apply -input=false tfplan

      - name: Get outputs
        working-directory: terraform/eks/default
        run: |
          KUBECTL_CMD=$(terraform output -raw configure_kubectl 2>/dev/null || echo "N/A")
          APP_URL=$(terraform output -raw retail_app_url 2>/dev/null || echo "Pending...")

          echo "### EKS Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application URL:** ${APP_URL}" >> $GITHUB_STEP_SUMMARY
          echo "**Configure kubectl:** \`${KUBECTL_CMD}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** ${{ github.event.inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**OpenTelemetry:** ${{ github.event.inputs.opentelemetry_enabled }}" >> $GITHUB_STEP_SUMMARY
          echo "**Istio:** ${{ github.event.inputs.istio_enabled }}" >> $GITHUB_STEP_SUMMARY
